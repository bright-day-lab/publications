  <script>
    lucide.createIcons();

    function toggleFolder(btn) {
      const folder = btn.closest('.folder');
      folder.classList.toggle('folder-open');
    }

    // Document URL mapping with empty slots for user input
    const documentUrls = {
      'doc-1a': '',
      'doc-1b': '',
      'doc-2a': '',
      'doc-2b': '',
      'doc-3a': '',
      'doc-3b': '',
      'doc-3c': ''
    };

    function generateShareLink(docId) {
      const baseUrl = window.location.origin + window.location.pathname;
      const params = new URLSearchParams({
        doc: docId,
        t: Date.now()
      });
      return `${baseUrl}?${params.toString()}`;
    }

    function handleDocumentClick(docId, event) {
      event.preventDefault();
      const url = documentUrls[docId];
      
      if (!url) {
        alert('PDF URL not configured for this document. Please add the URL in the editor.');
        return;
      }

      if (url.startsWith('http://') || url.startsWith('https://')) {
        // Open external PDF
        window.open(url, '_blank', 'noopener,noreferrer');
      } else {
        // Treat as file path
        const link = document.createElement('a');
        link.href = url;
        link.download = url.split('/').pop() || 'document';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }
    }

    function copyShareLink(docId) {
      const shareLink = generateShareLink(docId);
      navigator.clipboard.writeText(shareLink).then(() => {
        const btn = event.target;
        const originalText = btn.textContent;
        btn.textContent = 'Link copied!';
        setTimeout(() => {
          btn.textContent = originalText;
        }, 2000);
      }).catch(err => {
        alert('Failed to copy link');
      });
    }
  </script>
